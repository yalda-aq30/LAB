<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="contactUs.css">
    <title>Contact Us</title>
</head>

<body>
    
    <header>
        <div class="nav-bar">
            <div class="nav-logo">
               <h1>
                    <a class="logo" href="/homepage.html">Logo</a>
                    </h1>
            </div>
            <Nav class="nav-list">
                <ul class="nav-ul"> 
                   <li><a href="/homepage.html">Home</a></li>
                    <li><a href="/handbook.html">Handbook</a></li>
                    <li><a href="/aboutus.html">About Us</a></li>
                    <li><a href="/contactUs.html">Contact Us</a></li>
                    <li class="report-incident"><a class="report" href="/Report incident.html">Report Incident</a></li>
                </ul>
            </Nav>
        </div>
    </header>


    <h1 class="contact-us">Contact US</h1>
    <main>
        
        <div class="main-div"> 

            <form class="contact-form">

                <div class="left">

                    <label for="name" class="label">Name *</label>
                    <input type="text" id="name" name="name" required class="input" placeholder="Enter Your Name ...">

                    <label for="email" class="label">Email *</label>
                    <input type="email" id="email" name="email" required class="input" placeholder="Enter Your Email ...">

                    <label for="phone" class="label">Phone</label>
                    <input type="phone" id="phone" name="phone" required class="input" placeholder="Enter Your Phone Number ...">

                </div>
                
                <div class="left">

                    <label for="message" class="label">Message *</label>
                    <textarea id="message" name="message" rows="5" required class="message-input" placeholder="Enter Your Message Here ..."></textarea>

                </div>

                
            </form>
            <button type="submit" class="button">Submit</button> 
        </div>
        
    </main>





   <footer>
        <p>Copyright © 2026 team 2</p>
      </footer>

</body>
</html>
